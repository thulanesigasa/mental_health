version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://serenity_user:serenity_pass@db:5432/serenity_db
      - SECRET_KEY=production_strong_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=serenity_user
      - POSTGRES_PASSWORD=serenity_pass
      - POSTGRES_DB=serenity_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serenity_user -d serenity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
