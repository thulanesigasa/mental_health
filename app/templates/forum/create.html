{% extends "base.html" %}
{% block title %}Share Anonymously - Serenity{% endblock %}

{% block content %}
<div class="mb-2 animate-fade-up">
    <h2 style="font-weight: 500;">New Anonymous Post</h2>
    <p class="text-secondary">Your post will be shared with a randomly generated pseudonym. No identifying information
        will be public.</p>
</div>

<div class="module-card animate-fade-up delay-1" style="max-width: 700px; margin: 0 auto; padding: 2rem;">
    <form action="{{ url_for('forum.create') }}" method="POST">
        <div class="form-group mb-2">
            <label for="title" class="form-label">Subject / Title</label>
            <input type="text" name="title" id="title" class="form-control" placeholder="What's on your mind?" required>
        </div>
        <div class="form-group mb-2">
            <label for="content" class="form-label">Message</label>
            <textarea name="content" id="content" class="form-control" rows="8"
                placeholder="Share your experience, thoughts, or words of encouragement..." required></textarea>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <a href="{{ url_for('forum.index') }}" class="btn btn-outline"><i class="ph ph-arrow-left"></i> Back to
                Forum</a>
            <button type="submit" class="btn btn-primary"><i class="ph ph-paper-plane"></i> Post Anonymously</button>
        </div>
    </form>
</div>
{% endblock %}
