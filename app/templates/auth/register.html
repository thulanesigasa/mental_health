{% extends "base.html" %}
{% block title %}Register - Serenity{% endblock %}

{% block content %}
<div class="auth-container mt-2">
    <h2 class="text-center mb-1">Create Account</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="text-center mt-1 text-secondary">
        Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
</div>
{% endblock %}
