{% extends "base.html" %}
{% block title %}Reset Password Request - Serenity{% endblock %}

{% block content %}
<div class="auth-container mt-2">
    <div class="text-center mb-2">
        <h2>Reset <span style="font-weight: 100;">Password</span></h2>
        <p class="text-secondary">Enter your email and we'll send a secure link to reset your password.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password_request') }}">
        <div class="form-group">
            <label for="email">Email Address <span style="color: var(--error);">*</span></label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Request</button>
    </form>

    <div class="text-center mt-2">
        <p class="text-secondary" style="font-size: 0.9rem;">Remembered your password? <a
                href="{{ url_for('auth.login') }}" style="color: var(--accent-gold); text-decoration: none;">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
